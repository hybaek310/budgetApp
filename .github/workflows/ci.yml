name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run pytest
        run: pytest

      - name: Enforce 100 percent coverage
        run: pytest --cov=budget --cov-fail-under=100 --cov-report=term-missing

      - name: Check cyclomatic complexity with radon
        run: radon cc budget tests --min B --show-complexity

      - name: Check complexity threshold with xenon
        run: xenon --max-absolute B --max-modules B --max-average B budget tests

      - name: Run flake8
        run: flake8 budget tests
